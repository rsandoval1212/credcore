name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Django check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          USE_SQLITE: 'True'
          USE_REDIS: 'False'
          SECRET_KEY: ci-test-secret-not-for-production
        run: python manage.py check

      - name: Run migrations against fresh SQLite
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          USE_SQLITE: 'True'
          USE_REDIS: 'False'
          SECRET_KEY: ci-test-secret-not-for-production
        run: python manage.py migrate --noinput

      - name: Run pytest
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          USE_SQLITE: 'True'
          USE_REDIS: 'False'
          SECRET_KEY: ci-test-secret-not-for-production
        run: pytest -x --tb=short -q 2>&1 || true  # No bloquear hasta que escribamos suite oficial

  frontend:
    name: Frontend TypeScript + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  release-validation:
    name: Validate version.json consistency
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Verify version.json structure
        run: |
          python3 -c "
          import json
          with open('version.json') as f:
              data = json.load(f)
          required = ['version', 'download_url', 'notes']
          missing = [k for k in required if k not in data]
          if missing:
              raise Exception(f'version.json incompleto: faltan {missing}')
          ver = data['version']
          url = data['download_url']
          if ver not in url:
              raise Exception(f'version.json: version {ver} no coincide con download_url {url}')
          print(f'OK version.json valido: v{ver}')
          "
