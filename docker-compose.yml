version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: credcore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-credcore_db}
      POSTGRES_USER: ${DB_USER:-credcore_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-credcore_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: credcore_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credcore_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_NAME: ${DB_NAME:-credcore_db}
      DB_USER: ${DB_USER:-credcore_user}
      DB_PASSWORD: ${DB_PASSWORD:-credcore_password}
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credcore_celery
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A config worker -l info -Q default,notifications,reports

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credcore_beat
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: credcore_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_files:
